packages:
  - 'packages/*'
  - 'projects/yeoman-ui/packages/*'
  - 'examples/*'
allowBuilds:
  '@vscode/vsce-sign': true
  bufferutil: true
  core-js: true
  ejs: true
  es5-ext: true
  esbuild: true
  keytar: true
  utf-8-validate: true
overrides:
  '@types/lodash': '4.14.202'
  terser: '^5.48.0'
  terser-webpack-plugin>terser: '^5.48.0'
  # webide-client-tools uses jest@27; the yeoman-ui frontend uses jest@29.
  # Without this pin, jest@29's jest-environment-node lands in the pnpm
  # shared fallback and jest@27 picks it up at runtime, causing a crash.
  jest-runner>jest-environment-node: '27.5.1'
  jest-config>jest-environment-node: '27.5.1'
